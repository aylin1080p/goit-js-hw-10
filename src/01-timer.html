<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Timer</title>
<link rel="stylesheet" href="./css/common.css" />
</head>

<body>

<a href="./index.html">Back</a>

<input type="text" id="datetime-picker" />
<button data-start disabled>Start</button>

<div class="timer">

<div class="field">
<span data-days>00</span>
<span>Days</span>
</div>

<div class="field">
<span data-hours>00</span>
<span>Hours</span>
</div>

<div class="field">
<span data-minutes>00</span>
<span>Minutes</span>
</div>

<div class="field">
<span data-seconds>00</span>
<span>Seconds</span>
</div>

</div>

<script type="module" src="./js/01-timer.js"></script>

</body>
</html>
